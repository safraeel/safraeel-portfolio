name: "Lighthouse Audit"
on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]

jobs:
  lighthouse:
    name: Run Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse (temporary public storage)
        uses: treosh/lighthouse-ci-action@v9
        with:
          args: --upload.target=temporary-public-storage https://safraeel.me
