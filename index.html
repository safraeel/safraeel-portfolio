<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINEMA | Film Database</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui; }
    .hero { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/1920/1080') center/cover; height: 100vh; }
    .card { transition: all 0.4s; } .card:hover { transform: scale(1.08); }
  </style>
</head>
<body>
  <!-- HERO -->
  <div class="hero flex items-center justify-center text-center relative">
    <div class="max-w-4xl px-6">
      <h1 class="text-8xl font-bold tracking-tighter mb-4">CINEMA</h1>
      <p class="text-4xl mb-8">Discover. Explore. Watch.</p>
      <div class="relative max-w-xl mx-auto">
        <input id="search" type="text" placeholder="Search movies, series..." 
               class="w-full bg-black/70 border border-white/30 rounded-full py-6 px-8 text-2xl focus:outline-none focus:border-purple-500">
      </div>
    </div>
  </div>

  <!-- TRENDING -->
  <div class="px-8 py-12">
    <h2 class="text-5xl font-bold mb-8">Trending Now 🔥</h2>
    <div id="movies" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
  </div>

  <script>
    const API_KEY = "YOUR_TMDB_KEY_HERE";
    async function loadMovies() {
      const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`);
      const data = await res.json();
      const container = document.getElementById('movies');
      container.innerHTML = data.results.slice(0,12).map(m => `
        <div class="card bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
          <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full">
          <div class="p-4">
            <h3 class="font-bold text-xl">${m.title}</h3>
            <p class="text-sm text-gray-400">${m.release_date} • ⭐ ${m.vote_average}</p>
          </div>
        </div>
      `).join('');
    }
    loadMovies();
  </script>
</body>
</html>
